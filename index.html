<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MQTT Logger</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 1em; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border: 1px solid #ccc; padding: 4px; }
    #messages { height: 300px; overflow-y: scroll; }
  </style>
</head>
<body>
  <div>
    <label>Broker IP: <input id="ip" type="text"></label>
    <label>Port: <input id="port" type="number" value="1883"></label>
    <label>Topic: <input id="topic" type="text"></label>
    <button id="connect">Connect</button>
  </div>
  <div>
    <label>Filter: <input id="filter" type="text"></label>
    <button id="export">Export</button>
    <button id="clear">Clear</button>
  </div>
  <div id="messages">
    <table>
      <thead>
        <tr><th>Timestamp</th><th>Topic</th><th>Payload</th></tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>
<script src="renderer.js"></script>
</body>
</html>
